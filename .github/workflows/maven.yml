name: Java CI

on:
  push:
  pull_request:
  schedule: [ cron: '11 10 * * 0' ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'maven'

      - run: mvn --batch-mode --show-version --no-transfer-progress -DCI=GitHub install
